<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    
    <nav>
        <div class="container-fluid w-100">
            <div class="mb-0 h1 text-white">My Hit List</div>
        </div>
    </nav>

    <main class="bg-light min-vh-100 d-flex justify-content-center">
        <div class="container my-5 ">

            <!-- CREATE A TASK FORM -->
            <h3 class="mb-3 text-dark">Create New Task</h3>
            <form id="newTaskForm" class="newTaskForm  p-3 rounded">
                <div class="d-flex flex-wrap gap-3">
                    <div class="form-group flex-grow-1">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" id="title" name="title" class="form-control" placeholder="Mow the lawn" required>
                    </div>
                    <div class="form-group">
                        <label for="dueDate" class="form-label">Due Date</label>
                        <input type="date" id="dueDate" class="form-control" required>
                    </div>
                    <div class="align-self-end">
                        <button type="submit" class="btn btn-create">Create +</button>
                    </div>
                </div>
            </form>
            
            <!-- FILTER BAR -->
            <div class="filterBar" id="filterBar">
                <label class="text-white">Filter</label>
                <select id="taskFilter" class="form-select form-select-sm w-auto">
                    <option value="">All Tasks</option>
                    <option value="false">Incomplete</option>
                    <option value="true">Completed</option>
                </select>
                <div class="form-check">
                    <input type="checkbox" id="sortDueDate" class="form-check-input">
                    <label for="sortDueDate" class="form-check-label text-white">Sort by Due Date</label>
                </div>
            </div>


            <!-- TO DO LIST TABLE -->
            <div class="table-responsive mt-3">
                <table class="table table-hover table-light">
                    <thead>
                        <tr>
                            <th scope="col">Task</th>
                            <th scope="col">Due Date</th>
                            <th scope="col" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="toDoList" class="table-group-divider">
                    </tbody>
                </table>
            </div>


            <!-- POP UP EDIT MODEL -->
            <div class="modal fade" id="editModal">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit Task</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="text" id="editTitle" placeholder="Title" class="form-control mb-2">
                            <input type="date" id="editDate" class="form-control">
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary" onclick="editTask()">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        
        </div>
    </main>

    <footer>
        <div class="container-fluid w-100">
            <div class="mb-0 h6 text-white"> <i class="bi bi-c-circle"></i> 2026 Emma Rosier. All Rights Reserved</div>
        </div>
    </footer>
</body>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>

</html>
